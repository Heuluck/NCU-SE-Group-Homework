name: CI — Test & Build

on:
  push:
    branches: ["main"]
    paths:
      - 'fe/**'
      - 'be/**'
      - '.github/workflows/ci-test.yml'
  pull_request:
    branches: ["main"]
    paths:
      - 'fe/**'
      - 'be/**'
      - '.github/workflows/ci-test.yml'

jobs:
  backend-test:
    name: Backend Tests (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: be
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run unit tests with coverage
        run: |
          go test ./... -v -race -coverprofile=coverage.out -covermode=atomic
          go tool cover -func=coverage.out

      - name: Check coverage threshold (≥ 60%)
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 60" | bc -l) )); then
            echo "::error::Coverage ${COVERAGE}% is below threshold 60%"
            exit 1
          fi

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: coverage.out

  backend-integration-test:
    name: Backend API Integration Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: be
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run API integration tests
        run: |
          go test -v -tags=integration -count=1 -coverprofile=integration.out ./internal/httpapi/...
          go tool cover -func=integration.out

  frontend-test:
    name: Frontend Tests (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fe
    steps:
      - uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.20.0
          package-manager-cache: false

      - uses: pnpm/action-setup@v6
        name: Install pnpm
        with:
          version: 10.33.0

      - name: Install dependencies
        run: pnpm install

      - name: Run tests
        run: pnpm test

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fe
    steps:
      - uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.20.0
          package-manager-cache: false

      - uses: pnpm/action-setup@v6
        name: Install pnpm
        with:
          version: 10.33.0

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build