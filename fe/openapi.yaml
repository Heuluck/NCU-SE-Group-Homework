openapi: 3.0.3
info:
  title: GopherTodo Frontend API (Mock)
  version: "1.0.0"
  description: |
    OpenAPI 3.0 specification for the frontend mock API used by the FE.
    Contains examples for use with Prism (https://stoplight.io/open-source/prism).
servers:
  - url: http://localhost:3000
    description: Local dev server (Prism mock)

paths:
  /tasks:
    get:
      summary: List all tasks
      operationId: listTasks
      responses:
        '200':
          description: A JSON array of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Task'
              examples:
                sample:
                  summary: sample tasks list
                  value:
                    - id: 1
                      content: "示例任务：阅读规格文档"
                      status: "pending"
                      created_at: "2026-04-16T08:00:00Z"
                      completed_at: null
                    - id: 2
                      content: "示例任务：实现前端 Mock API"
                      status: "completed"
                      created_at: "2026-04-15T09:00:00Z"
                      completed_at: "2026-04-15T12:00:00Z"
    post:
      summary: Create a new task
      operationId: createTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskInput'
            examples:
              sample:
                summary: create example
                value:
                  content: "买牛奶"
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
              examples:
                created:
                  value:
                    id: 3
                    content: "买牛奶"
                    status: "pending"
                    created_at: "2026-04-16T10:00:00Z"
                    completed_at: null
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /tasks/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    get:
      summary: Get a task by ID
      operationId: getTask
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
              examples:
                sample:
                  value:
                    id: 1
                    content: "示例任务：阅读规格文档"
                    status: "pending"
                    created_at: "2026-04-16T08:00:00Z"
                    completed_at: null
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      summary: Delete a task by ID
      operationId: deleteTask
      responses:
        '204':
          description: No Content
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /tasks/{id}/complete:
    post:
      summary: Mark a task as completed
      operationId: completeTask
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Updated Task
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
              examples:
                completed:
                  value:
                    id: 1
                    content: "示例任务：阅读规格文档"
                    status: "completed"
                    created_at: "2026-04-16T08:00:00Z"
                    completed_at: "2026-04-16T11:00:00Z"
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  schemas:
    Task:
      type: object
      properties:
        id:
          type: integer
          example: 1
        content:
          type: string
          example: "示例任务"
        status:
          type: string
          enum: [pending, completed]
          example: pending
        created_at:
          type: string
          format: date-time
          example: "2026-04-16T08:00:00Z"
        completed_at:
          type: string
          format: date-time
          nullable: true
          example: null
      required: [id, content, status, created_at]

    TaskInput:
      type: object
      properties:
        content:
          type: string
      required: [content]

    Error:
      type: object
      properties:
        code:
          type: string
          example: "not_found"
        message:
          type: string
          example: "任务未找到"
